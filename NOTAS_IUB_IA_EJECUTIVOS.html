        }

            margin-top: 30px; 
            margin-bottom: 10px;
            color: #000;
        }

            margin-bottom: 20px; 
            font-size: 14px; 
        }
        th, td { 
            border: 1px solid #000000; 
            padding: 4px 8px; 
            text-align: center; 
            vertical-align: middle;
        }
        th { 
            background-color: #f2f2f2; 
            font-weight: bold; 
        }

        .bg-forma { background-color: #e2efda; }

        function consultar() {

            const resultDiv = document.getElementById('result');

            }

            t1HTML += `<tr class="bg-penalizacion"><td colspan="2">PENALIZACIÓN</td><td class="bg-white">${d1.pen}</td></tr>`;
            let final1Val = typeof d1.final === 'number' ? d1.final.toFixed(2) : d1.final;
            t1HTML += `<tr><td colspan="2" style="background-color:#ffffff; font-weight:bold;">NOTA FINAL</td><td class="bg-white" style="font-weight:bold;">${final1Val}</td></tr>`;
            
            document.getElementById('t1-table').innerHTML = t1HTML;
            document.getElementById('t1-comments').innerHTML = `<strong>COMENTARIOS DEL EVALUADOR:</strong><br><br>${t1_comments[student.t1_g]}`;
            
            // Render Taller 2 Table
            const d2 = t2_data[student.t2_g];
            let t2HTML = `<tr><th>PORCENTAJE</th><th>CRITERIO</th><th>NOTA</th></tr>`;
            t2_labels.forEach((row, i) => {
                t2HTML += `<tr class="${row.color}">
                    <td>${row.pct}</td>
                    <td>${row.crit}</td>
                    <td class="bg-white">${d2.grades[i]}</td>
                </tr>`;
            });
            t2HTML += `<tr class="bg-bono"><td colspan="2">BONO</td><td class="bg-white">${d2.bono}</td></tr>`;
            t2HTML += `<tr class="bg-penalizacion"><td colspan="2">PENALIZACIÓN</td><td class="bg-white"></td></tr>`;
            let final2Val = typeof d2.final === 'number' ? d2.final.toFixed(2) : d2.final;
            t2HTML += `<tr><td colspan="2" style="background-color:#ffffff; font-weight:bold;">NOTA FINAL</td><td class="bg-white" style="font-weight:bold;">${final2Val}</td></tr>`;
            
            document.getElementById('t2-table').innerHTML = t2HTML;
            
            // Final Grade Calculation
            const nf1 = parseFloat(d1.final);
            const nf2 = parseFloat(d2.final);
            const consolidada = (nf1 * 0.3) + (nf2 * 0.7);
            document.getElementById('final-grade').innerText = consolidada.toFixed(2);
            
            // Points calculation (cap at 100, round to nearest integer)
            let rawPoints = (consolidada / 5.00) * 100;
            let finalPoints = Math.round(Math.min(rawPoints, 100));
            document.getElementById('final-points').innerText = `${finalPoints} / 100 Puntos`;
        }
    </script>
</body>
</html>
