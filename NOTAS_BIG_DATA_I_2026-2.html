        function consultar() {
            const cedulaInput = document.getElementById('cedula').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const resultDiv = document.getElementById('result');
            
            if (!db[cedulaInput]) {
                errorMsg.style.display = 'block';
                resultDiv.style.display = 'none';
                return;
            }
            
            errorMsg.style.display = 'none';
            resultDiv.style.display = 'block';
            
            const student = db[cedulaInput];
            document.getElementById('student-name').innerText = student.grupo;
            document.getElementById('student-id').innerText = student.cedula;
            document.getElementById('student-timestamp').innerText = student.marca === '-' ? 'No registró entrega' : student.marca;
            
            // Tabla Excel
            let san = student.saneamiento === '-' ? 0 : parseFloat(student.saneamiento);
            let mod = student.modelo === '-' ? 0 : parseFloat(student.modelo);
            let totalExcel = san + mod;
            
            let excelHTML = `<tr><th>Criterio</th><th>Puntaje obtenido</th></tr>`;
            excelHTML += `<tr class="bg-estructura"><td>Saneamiento de datos (Máximo 20)</td><td class="bg-white">${student.saneamiento}</td></tr>`;
            excelHTML += `<tr class="bg-forma"><td>Modelo de pronóstico (Máximo 40)</td><td class="bg-white">${student.modelo}</td></tr>`;
            excelHTML += `<tr class="bg-total"><td>Total Excel (Máximo 60)</td><td>${totalExcel}</td></tr>`;
            
            document.getElementById('excel-table').innerHTML = excelHTML;
            document.getElementById('excel-comments').innerHTML = `<strong>Comentarios Excel:</strong><br><br>${student.com_excel}`;
            
            // Tabla Power BI
            let com = student.comercial === '-' ? 0 : parseFloat(student.comercial);
            let ren = student.rendimiento === '-' ? 0 : parseFloat(student.rendimiento);
            let totalPbi = com + ren;
            
            let pbiHTML = `<tr><th>Criterio</th><th>Puntaje obtenido</th></tr>`;
            pbiHTML += `<tr class="bg-estrategias"><td>Dashboard comercial (Máximo 20)</td><td class="bg-white">${student.comercial}</td></tr>`;
            pbiHTML += `<tr class="bg-razonamiento"><td>Dashboard de rendimiento (Máximo 20)</td><td class="bg-white">${student.rendimiento}</td></tr>`;
            pbiHTML += `<tr class="bg-total"><td>Total Power BI (Máximo 40)</td><td>${totalPbi}</td></tr>`;
            
            document.getElementById('pbi-table').innerHTML = pbiHTML;
            document.getElementById('pbi-comments').innerHTML = `<strong>Comentarios Power BI:</strong><br><br>${student.com_pbi}`;
            
            // Info Resumen
            document.getElementById('bono-val').innerText = student.bono === '-' ? '0.0' : `+${student.bono}`;
            document.getElementById('bono-expo-val').innerText = student.bono_expo > 0 ? `+${student.bono_expo}` : '0.0';
            document.getElementById('final-points').innerText = `${student.puntos} / 100 puntos`;
            
            // Mostrar la nota asegurando los 2 decimales
            document.getElementById('final-grade').innerText = student.nota.toFixed(2);
        }

        // Permitir Enter para buscar
        document.getElementById("cedula").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                consultar();
            }
        });
    </script>
